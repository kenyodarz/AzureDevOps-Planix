server:
  port: 8080
spring:
  application:
    name: "McpAzureDevOps"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
  ai:
    mcp:
      server:
        protocol: "STATELESS"
        name: "${spring.application.name}"
        version: "1.0.0"
        type: "ASYNC"
        instructions: "Reactive MCP Server with capabilities:\n- Tools: Executable\
          \ tools\n- Resources: Access to system and user data\n- Prompts: Custom\
          \ conversation templates\n\nSecurity: Authenticated via Entra ID (Bearer\
          \ Token)"
        streamable-http:
          mcp-endpoint: "/mcp/${spring.application.name}"
        capabilities:
          tool: true
          resource: true
          prompt: true
          completion: false
        request-timeout: "30s"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "https://login.microsoftonline.com/${TENANT_ID:dummy_tenant}/v2.0"
          client-id: "${CLIENT_ID:dummy_client}"
jwt:
  json-exp-roles: "/roles"
adapter:
  restconsumer:
    timeout: 5000
    url: "https://dev.azure.com"
    token: "${AZURE_DEVOPS_TOKEN:your-token-here}"
management:
  health:
    circuitbreakers:
      enabled: true
resilience4j:
  circuitbreaker:
    instances:
      testGet:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
      testPost:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
